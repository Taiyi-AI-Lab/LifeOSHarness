services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
      POSTGRES_DB: lifeos
    ports:
      - "5432:5432"
    volumes:
      - lifeos_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: lifeostomanyagent/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://lifeos:lifeos@postgres:5432/lifeos
      REDIS_URL: redis://redis:6379/0
      LIFEOS_API_KEY: dev-lifeos-key-change-me
      LIFEOS_DATA_ROOT: /data
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - lifeos_data:/data
      - ../003-life-os:/app/003-life-os:ro

volumes:
  lifeos_pg:
  lifeos_data:
