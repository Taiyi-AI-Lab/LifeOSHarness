# Development-only stack. The credentials and keys below are insecure defaults
# meant for local use. See SECURITY.md before deploying outside your machine.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifeos
      # Dev-only password. Change this (and DATABASE_URL) for any shared deployment.
      POSTGRES_PASSWORD: lifeos
      POSTGRES_DB: lifeos
    ports:
      - "5432:5432"
    volumes:
      - lifeos_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://lifeos:lifeos@postgres:5432/lifeos
      REDIS_URL: redis://redis:6379/0
      # Dev-only API key. MUST be replaced with a strong secret before exposure.
      LIFEOS_API_KEY: dev-lifeos-key-change-me
      LIFEOS_DATA_ROOT: /data
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - lifeos_data:/data

volumes:
  lifeos_pg:
  lifeos_data:
